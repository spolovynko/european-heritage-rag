services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: european-heritage-rag:phase6
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      BRONZE_DATA_DIRECTORY: /app/data/bronze
      SILVER_DATA_DIRECTORY: /app/data/silver
    ports:
      - "8000:8000"
    volumes:
      - ingestion-state:/app/var/ingestion
      - bronze-data:/app/data/bronze
      - silver-data:/app/data/silver
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  ingestion-state:
  bronze-data:
  silver-data:
