services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: european-heritage-rag:phase3
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
